<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Navbar</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <a href="" id="logo">Logo</a>

        <div class="nav-menu">
            <ul class="nav-list">
                <li class="nav-items">
                    <a href="index.html" class="nav-links active">Home</a>
                </li>

                <li class="nav-items">
                    <a href="about.html" class="nav-links">About Us</a>
                </li>

                <li class="nav-items">
                    <a href="services.html" class="nav-links">Services</a>
                </li>

                <li class="nav-items">
                    <a href="featured.html" class="nav-links">Featured</a>
                </li>

                <li class="nav-items">
                    <a href="contact.html" class="nav-links">Contact Me</a>
                </li>
            </ul>
        </div>

        <div class="nav-icons">
            <i class="ri-search-line" id="searchIcon"></i>
            <i class="ri-user-line" id="userIcon"></i>
        </div>

        <div class="hamburger" id="hamburger">
            <i class="ri-menu-line"></i>
        </div>
    </nav>

    <div class="search-modal" id="searchModal">
        <div class="search-box">
            <span class="close-btn">&times;</span>

            <div class="search-input">
                <i class="ri-search-line"></i>
                <input type="text" placeholder="What are you looking for?">
            </div>

        </div>
    </div>

    <div class="login-modal" id="loginModal">
        <div class="login-box">
            <span class="close-login">&times;</span>

            <h2>Log In</h2>

            <label>Email</label>
            <input type="email" placeholder="Write your email">

            <label>Password</label>
            <input type="password" placeholder="Enter your password">

            <p>
                You do not have an account?
                <a href="#">Sign Up</a>
            </p>

            <a href="#" class="forgot">You forgot your password</a>

            <button>Log In</button>
        </div>

    </div>
    <script src="script.js"></script>
</body>

</html>
